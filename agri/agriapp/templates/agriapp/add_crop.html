{% extends 'base.html' %}
{% load static %}

{% block content %}
<style>
/* --- FORM PAGE STYLES --- */
.form-container {
    padding: 60px 0;
    background-color: var(--bg-light);
    min-height: 90vh;
}

.form-card {
    background: white;
    max-width: 550px;
    margin: 0 auto;
    padding: 40px;
    border-radius: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.05);
    border: 1px solid #E0E0E0;
    position: relative;
}

.form-card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 6px;
    background: var(--primary-main);
    border-radius: 20px 20px 0 0;
}

.form-header {
    text-align: center;
    margin-bottom: 35px;
}

.form-header h2 {
    color: var(--primary-deep);
    font-weight: 800;
    margin-bottom: 10px;
}

.form-header p {
    color: var(--text-muted);
    font-size: 0.95rem;
}

/* --- DJANGO FORM STYLING --- */
/* This targets the p tags generated by {{ form.as_p }} */
.form-card p {
    margin-bottom: 20px;
}

.form-card label {
    display: block;
    font-weight: 700;
    color: var(--accent-earth);
    margin-bottom: 8px;
    font-size: 0.9rem;
}

.form-card input, 
.form-card select, 
.form-card textarea {
    width: 100%;
    padding: 12px 15px;
    border: 2px solid #EEE;
    border-radius: 10px;
    font-size: 1rem;
    transition: all 0.3s ease;
}

.form-card input:focus, 
.form-card select:focus {
    border-color: var(--primary-main);
    outline: none;
    background-color: var(--primary-light);
    box-shadow: 0 0 0 4px rgba(46, 125, 50, 0.1);
}

/* --- BUTTONS --- */
.btn-save-crop {
    background-color: var(--primary-main);
    color: white;
    border: none;
    width: 100%;
    padding: 15px;
    border-radius: 12px;
    font-weight: 700;
    font-size: 1.1rem;
    cursor: pointer;
    transition: all 0.3s ease;
    margin-top: 10px;
}

.btn-save-crop:hover {
    background-color: var(--primary-deep);
    transform: translateY(-2px);
    box-shadow: 0 5px 15px rgba(46, 125, 50, 0.2);
}

.btn-cancel {
    display: block;
    text-align: center;
    margin-top: 20px;
    color: var(--text-muted);
    text-decoration: none;
    font-size: 0.9rem;
    font-weight: 600;
}

.btn-cancel:hover {
    color: var(--status-danger);
}
</style>

<div class="form-container">
    <div class="container">
        
        <div class="form-card">
            <div class="form-header">
                <h2>🌱 Add New Crop</h2>
                <p>Enter your crop details to begin receiving weather-based field insights.</p>
            </div>

            <form method="post" novalidate>
                {% csrf_token %}
                
                <div class="organic-form-fields">
                    {{ form.as_p }}
                </div>

                <button type="submit" class="btn-save-crop">
                    💾 Save Field Data
                </button>
            </form>

            <a href="{% url 'my_crops' %}" class="btn-cancel">
                Cancel and return to list
            </a>
        </div>

    </div>
</div>
{% endblock %}
