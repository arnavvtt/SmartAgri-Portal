<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login | Smart Agriculture Portal</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            box-sizing: border-box;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            margin: 0;
            height: 100vh;
            background: linear-gradient(
                to bottom right,
                #f1f8e9,
                #e8f5e9
            );
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-container {
            background: #ffffff;
            padding: 38px 34px;
            width: 380px;
            border-radius: 16px;
            border-top: 7px solid #2e7d32;
            box-shadow: 0 18px 40px rgba(0,0,0,0.15);
            transition: 0.3s ease;
            animation: fadeIn 0.6s ease;
        }

        .login-container:hover {
            transform: translateY(-4px);
            box-shadow: 0 22px 45px rgba(0,0,0,0.18);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h2 {
            text-align: center;
            margin-bottom: 8px;
            color: #2e7d32;
            letter-spacing: 0.5px;
        }

        p.subtitle {
            text-align: center;
            font-size: 14px;
            color: #6b6b6b;
            margin-bottom: 30px;
        }

        label {
            font-weight: 600;
            font-size: 14px;
            color: #3e3e3e;
        }

        .input-group {
            position: relative;
            margin-bottom: 18px;
        }

        .input-group::before {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 16px;
            opacity: 0.6;
        }

        .user::before { content: "👤"; }
        .lock::before { content: "🔒"; }

        input {
            width: 100%;
            padding: 11px 11px 11px 38px;
            border-radius: 8px;
            border: 1px solid #c5e1a5;
            outline: none;
            transition: 0.3s;
            background: #fbfff8;
        }

        input:focus {
            border-color: #2e7d32;
            box-shadow: 0 0 6px rgba(46,125,50,0.35);
            background: #ffffff;
        }

        button {
            width: 100%;
            padding: 13px;
            background: linear-gradient(
                to right,
                #2e7d32,
                #43a047
            );
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            letter-spacing: 0.5px;
        }

        button:hover {
            background: linear-gradient(
                to right,
                #1b5e20,
                #2e7d32
            );
        }

        .error {
            text-align: center;
            color: #c62828;
            margin-top: 15px;
            font-size: 14px;
            font-weight: 600;
        }

        .footer-text {
            text-align: center;
            margin-top: 24px;
            font-size: 13px;
            color: #5f5f5f;
            line-height: 1.6;
        }

        .footer-text a {
            color: #2e7d32;
            text-decoration: none;
            font-weight: 600;
        }

        .footer-text a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

<div class="login-container">
    <h2>Farmer Login 🌾</h2>
    <p class="subtitle">Smart Agriculture Management System</p>

    <form method="post">
        {% csrf_token %}

        <label>Username</label>
        <div class="input-group user">
            <input type="text" name="username" placeholder="Enter your username" required>
        </div>

        <label>Password</label>
        <div class="input-group lock">
            <input type="password" name="password" placeholder="Enter your password" required>
        </div>

        <button type="submit">Login</button>
    </form>

    {% if error %}
        <p class="error">{{ error }}</p>
    {% endif %}

    <div class="footer-text">
        New Farmer?
        <a href="/register/">Create an account</a><br>
        🌱 Empowering Farmers with Smart Technology
    </div>
</div>

</body>
</html>
